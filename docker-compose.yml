services:

  web:
    image: ghcr.io/derrobin99/smart-drink-fridge:latest
    container_name: smart-drink-fridge-web
    restart: unless-stopped
    command: python3 app.py
    ports:
      - "5000:5000"
    environment:
      DATABASE_PATH: /data/getraenke.db
      STORNO_PASSWORT: ${STORNO_PASSWORT}
      UPDATE_CHECKER_ENABLED: ${UPDATE_CHECKER_ENABLED:-true}
    volumes:
      - fridge-data:/data

  scanner:
    profiles:
      - scanner
    image: ghcr.io/derrobin99/smart-drink-fridge:latest
    container_name: smart-drink-fridge-scanner
    restart: unless-stopped
    command: python3 scanner.py
    environment:
      DATABASE_PATH: /data/getraenke.db
      PUSHOVER_USER: ${PUSHOVER_USER}
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN}
    volumes:
      - fridge-data:/data
    devices:
      - /dev/video0:/dev/video0
    privileged: true

  tailscale:
    profiles:
      - tailscale
    image: tailscale/tailscale:latest
    container_name: smart-drink-fridge-tailscale
    hostname: ${TAILSCALE_HOSTNAME:-smart-drink-fridge}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale-state:/var/lib/tailscale
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

volumes:
  fridge-data:
  tailscale-state:
